<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overview — Atomo Forge</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('atomo-overview-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* ignore */ }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/overview.css">
  <script src="/js/live-metrics.js" defer></script>
  <script src="/js/app-shell.js" defer></script>
  <script src="/js/camera-management.js" defer></script>
  <script src="/js/overview.js" defer></script>
</head>
<body class="ov-body">
  <div class="ov-app">
    <!-- APP_SIDEBAR -->

    <div class="ov-shell">
      <div class="ov-navbar" role="banner">
        <button type="button" class="ov-icon-btn ov-nav-toggle-btn" id="navToggle" title="Open menu" aria-label="Open menu" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <label class="ov-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" placeholder="Search cameras, alerts…" aria-label="Search">
        </label>

        <div class="ov-metrics-strip" id="liveMetricsStrip" aria-label="Live system metrics"></div>

        <div class="ov-nav-actions">
          <button type="button" class="ov-icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
          <button type="button" class="ov-icon-btn" id="logoutBtn" title="Sign out" aria-label="Sign out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>

      <div class="ov-section-head">
        <div>
          <h1>System Overview</h1>
          <p class="ov-breadcrumb" id="breadcrumb">Electron · loading…</p>
        </div>
        
      </div>

      <main class="ov-main">
        <section class="ov-stats-grid" id="donutGrid" aria-label="Hero metrics"></section>

        <section class="ov-info-grid" id="infoGrid" aria-label="Device information"></section>

        <section id="cameraManagement" class="ov-cam-mgmt-wrap" aria-label="Camera management"></section>
      </main>
    </div>
  </div>

  <div class="ov-toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
