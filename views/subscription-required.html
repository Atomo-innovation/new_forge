<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription required — Atomo Forge</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('atomo-overview-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* ignore */ }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/overview.css">
  <script src="/js/app-shell.js" defer></script>
</head>
<body class="ov-body">
  <div class="ov-app">
    <!-- APP_SIDEBAR -->

    <div class="ov-shell">
      <div class="ov-navbar" role="banner">
        <button type="button" class="ov-icon-btn ov-nav-toggle-btn" id="navToggle" title="Open menu" aria-label="Open menu" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="ov-nav-actions">
          <button type="button" class="ov-icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
          <button type="button" class="ov-icon-btn" id="logoutBtn" title="Sign out" aria-label="Sign out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>

      <main class="ov-main ov-subscription-main">
        <article class="ov-card ov-subscription-card">
          <div class="ov-subscription-icon" aria-hidden="true">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2 20 6v6c0 5-3.5 9.4-8 10-4.5-.6-8-5-8-10V6l8-4Z"/><path d="M12 8v4M12 16h.01"/></svg>
          </div>
          <h1>Subscription required</h1>
          <p class="ov-subscription-lead">
            This feature is included with an active Atomo Forge subscription. Upgrade your plan to unlock Fire &amp; Smoke, Safety, AI Models, Settings, and more.
          </p>
          <div class="ov-subscription-actions">
            <a href="/detection/person" class="ov-cam-add-btn">Try Person detection</a>
            <a href="/detection/face" class="ov-quick-btn">Try Face recognition</a>
            <a href="/overview" class="ov-quick-btn">Back to Overview</a>
          </div>
        </article>
      </main>
    </div>
  </div>
</body>
</html>
